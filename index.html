<!--
  LifeTracker — Home Dashboard (index.html)
  localStorage keys read (not written here):
    lifetracker_v1_restaurants
    lifetracker_v1_media
    lifetracker_v1_fitness
    lifetracker_v1_travel
    lifetracker_v1_habits
    lifetracker_v1_settings
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: #F9F7F4;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #888880;
    --accent: #C4714A;
    --accent-light: #F5E8E0;
    --border: #EDEBE7;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 16px;
    --font-head: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container {
    max-width: 430px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }
  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-top: 52px;
    padding-bottom: 28px;
  }
  .greeting-label {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .greeting-name {
    font-family: var(--font-head);
    font-size: 30px;
    line-height: 1.1;
    color: var(--text);
  }
  .settings-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 8px;
    transition: background 0.15s, transform 0.15s;
    color: var(--text-muted);
  }
  .settings-btn:active { transform: scale(0.93); background: var(--accent-light); }

  /* Today strip */
  .today-strip {
    background: var(--text);
    color: #fff;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .today-left {}
  .today-date {
    font-size: 12px;
    font-weight: 500;
    opacity: 0.55;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .today-nudge {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.4;
  }
  .today-streak {
    background: var(--accent);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* Tracker cards */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }
  .tracker-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid var(--border);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .tracker-card:active {
    transform: scale(0.97);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-family: var(--font-head);
    font-size: 18px;
    margin-bottom: 3px;
    line-height: 1.2;
  }
  .card-stat {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .card-arrow {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Settings panel */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: flex; align-items: flex-end; justify-content: center; }
  .settings-panel {
    background: var(--card);
    width: 100%;
    max-width: 430px;
    border-radius: 24px 24px 0 0;
    padding: 24px 24px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .overlay.open .settings-panel { transform: translateY(0); }
  .panel-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .panel-title {
    font-family: var(--font-head);
    font-size: 22px;
    margin-bottom: 20px;
  }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
  }
  .field-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 20px;
  }
  .field-input:focus { border-color: var(--accent); }
  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn-save:active { opacity: 0.85; transform: scale(0.98); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="greeting-label" id="timeGreeting">Good morning</div>
      <div class="greeting-name" id="greetingName">Welcome back.</div>
    </div>
    <button class="settings-btn" onclick="openSettings()" aria-label="Settings">
      <i data-lucide="settings" width="18" height="18"></i>
    </button>
  </div>

  <div class="today-strip" id="todayStrip">
    <div class="today-left">
      <div class="today-date" id="todayDate"></div>
      <div class="today-nudge" id="todayNudge">Loading your day...</div>
    </div>
    <div class="today-streak" id="streakBadge" style="display:none"></div>
  </div>

  <div class="section-label">Your trackers</div>
  <div class="cards-grid">
    <a class="tracker-card" href="restaurants.html">
      <div class="card-icon">🍽️</div>
      <div class="card-body">
        <div class="card-title">Restaurants</div>
        <div class="card-stat" id="stat-restaurants">Loading...</div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" width="18" height="18"></i></div>
    </a>
    <a class="tracker-card" href="media.html">
      <div class="card-icon">🎬</div>
      <div class="card-body">
        <div class="card-title">Media</div>
        <div class="card-stat" id="stat-media">Loading...</div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" width="18" height="18"></i></div>
    </a>
    <a class="tracker-card" href="fitness.html">
      <div class="card-icon">💪</div>
      <div class="card-body">
        <div class="card-title">Fitness</div>
        <div class="card-stat" id="stat-fitness">Loading...</div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" width="18" height="18"></i></div>
    </a>
    <a class="tracker-card" href="travel.html">
      <div class="card-icon">✈️</div>
      <div class="card-body">
        <div class="card-title">Travel</div>
        <div class="card-stat" id="stat-travel">Loading...</div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" width="18" height="18"></i></div>
    </a>
    <a class="tracker-card" href="habits.html">
      <div class="card-icon">✅</div>
      <div class="card-body">
        <div class="card-title">Habits</div>
        <div class="card-stat" id="stat-habits">Loading...</div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" width="18" height="18"></i></div>
    </a>
  </div>
</div>

<!-- Settings overlay -->
<div class="overlay" id="settingsOverlay" onclick="closeSettingsIfOutside(event)">
  <div class="settings-panel">
    <div class="panel-handle"></div>
    <div class="panel-title">Settings</div>
    <label class="field-label" for="nameInput">Your name</label>
    <input class="field-input" id="nameInput" type="text" placeholder="e.g. Alex" maxlength="40">
    <button class="btn-save" onclick="saveSettings()">Save</button>
  </div>
</div>

<script>
  if(window.lucide) lucide.createIcons();

  // Greet
  function initGreeting() {
    const h = new Date().getHours();
    const label = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('timeGreeting').textContent = label;
    const settings = JSON.parse(localStorage.getItem('lifetracker_v1_settings') || '{}');
    const name = settings.name || '';
    document.getElementById('greetingName').textContent = name ? `Hey, ${name}.` : 'Welcome back.';
  }

  // Today strip
  function initToday() {
    const now = new Date();
    document.getElementById('todayDate').textContent = now.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    // habits
    try {
      const habits = JSON.parse(localStorage.getItem('lifetracker_v1_habits') || '{}');
      const habitList = habits.habits || [];
      const todayKey = now.toISOString().slice(0, 10);
      const completions = habits.completions || {};
      const todayCompleted = habitList.filter(h => (completions[todayKey] || []).includes(h.id));
      const total = habitList.filter(h => {
        if (h.frequency === 'daily') return true;
        const day = now.toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase();
        return (h.days || []).includes(day);
      });

      if (total.length === 0) {
        document.getElementById('todayNudge').textContent = 'No habits set yet. Add some in the Habits tracker.';
      } else if (todayCompleted.length === total.length) {
        document.getElementById('todayNudge').textContent = `All ${total.length} habits done today. 🎉`;
      } else {
        const left = total.length - todayCompleted.length;
        document.getElementById('todayNudge').textContent = `${left} habit${left !== 1 ? 's' : ''} left to complete today.`;
      }

      // streak
      const bestStreak = calcBestStreak(habitList, completions);
      if (bestStreak > 1) {
        const badge = document.getElementById('streakBadge');
        badge.style.display = '';
        badge.textContent = `🔥 ${bestStreak}d`;
      }
    } catch(e) {
      document.getElementById('todayNudge').textContent = 'Start tracking your day.';
    }
  }

  function calcBestStreak(habits, completions) {
    let best = 0;
    for (const h of habits) {
      let streak = 0;
      let d = new Date();
      for (let i = 0; i < 365; i++) {
        const key = d.toISOString().slice(0, 10);
        if ((completions[key] || []).includes(h.id)) streak++;
        else break;
        d.setDate(d.getDate() - 1);
      }
      if (streak > best) best = streak;
    }
    return best;
  }

  // Stats
  function initStats() {
    // Restaurants
    try {
      const r = JSON.parse(localStorage.getItem('lifetracker_v1_restaurants') || '{}');
      const list = r.restaurants || [];
      const visited = list.filter(x => x.status === 'Visited');
      const avg = visited.length ? (visited.reduce((s, x) => s + (x.rating || 0), 0) / visited.length).toFixed(1) : null;
      document.getElementById('stat-restaurants').textContent =
        list.length === 0 ? 'No restaurants tracked yet' :
        `${list.length} tracked${avg ? `, avg rating ${avg}` : ''}`;
    } catch(e) { document.getElementById('stat-restaurants').textContent = 'No restaurants tracked yet'; }

    // Media
    try {
      const m = JSON.parse(localStorage.getItem('lifetracker_v1_media') || '{}');
      const movies = (m.movies || []);
      const books = (m.books || []);
      const year = new Date().getFullYear().toString();
      const moviesThisYear = movies.filter(x => (x.dateAdded || '').startsWith(year)).length;
      const booksThisYear = books.filter(x => (x.dateAdded || '').startsWith(year)).length;
      document.getElementById('stat-media').textContent =
        (movies.length + books.length + (m.tv || []).length) === 0 ? 'No media tracked yet' :
        `${moviesThisYear} movie${moviesThisYear !== 1 ? 's' : ''}, ${booksThisYear} book${booksThisYear !== 1 ? 's' : ''} this year`;
    } catch(e) { document.getElementById('stat-media').textContent = 'No media tracked yet'; }

    // Fitness — reads from PPL tracker (ppl_v3)
    try {
      const f = JSON.parse(localStorage.getItem('ppl_v3') || '{}');
      const _pad = n => n < 10 ? '0'+n : ''+n;
      const _toKey = d => d.getFullYear()+'-'+_pad(d.getMonth()+1)+'-'+_pad(d.getDate());
      const now = new Date(); now.setHours(0,0,0,0);
      const dateSet = {};
      let totalSessions = 0;
      Object.entries(f).forEach(([ds, e]) => {
        const entry = (!e.types && e.type) ? {...e, types:[e.type]} : e;
        if (entry && !entry.rest && entry.types && entry.types.length) { dateSet[ds] = true; totalSessions++; }
      });
      let weekSessions = 0;
      for (let i = 0; i <= 6; i++) { const d = new Date(now); d.setDate(now.getDate()-i); if (dateSet[_toKey(d)]) weekSessions++; }
      let streak = 0; const sc = new Date(now);
      while (true) { const k = _toKey(sc); if (dateSet[k]) { streak++; sc.setDate(sc.getDate()-1); } else if (k===_toKey(now)) { sc.setDate(sc.getDate()-1); } else break; }
      document.getElementById('stat-fitness').textContent =
        totalSessions === 0 ? 'No sessions logged yet' :
        streak > 0 ? `${weekSessions}x this week · ${streak > 1 ? '🔥'+streak+'d streak' : totalSessions+' total sessions'}` :
        `${weekSessions}x this week, ${totalSessions} total sessions`;
    } catch(e) { document.getElementById('stat-fitness').textContent = 'No sessions logged yet'; }

    // Travel
    try {
      const t = JSON.parse(localStorage.getItem('lifetracker_v1_travel') || '{}');
      const places = t.places || [];
      const visited = places.filter(p => p.status === 'Visited');
      const countries = new Set(visited.map(p => p.country)).size;
      document.getElementById('stat-travel').textContent =
        visited.length === 0 ? 'No places tracked yet' :
        `${visited.length} cities, ${countries} country${countries !== 1 ? 'ies' : 'y'} visited`;
    } catch(e) { document.getElementById('stat-travel').textContent = 'No places tracked yet'; }

    // Habits
    try {
      const habits = JSON.parse(localStorage.getItem('lifetracker_v1_habits') || '{}');
      const habitList = habits.habits || [];
      const todayKey = new Date().toISOString().slice(0, 10);
      const completions = habits.completions || {};
      const today = new Date();
      const todayScheduled = habitList.filter(h => {
        if (h.frequency === 'daily') return true;
        const day = today.toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase();
        return (h.days || []).includes(day);
      });
      const done = todayScheduled.filter(h => (completions[todayKey] || []).includes(h.id)).length;
      document.getElementById('stat-habits').textContent =
        habitList.length === 0 ? 'No habits set up yet' :
        `${done}/${todayScheduled.length} completed today`;
    } catch(e) { document.getElementById('stat-habits').textContent = 'No habits set up yet'; }
  }

  // Settings
  function openSettings() {
    const settings = JSON.parse(localStorage.getItem('lifetracker_v1_settings') || '{}');
    document.getElementById('nameInput').value = settings.name || '';
    document.getElementById('settingsOverlay').classList.add('open');
  }
  function closeSettingsIfOutside(e) {
    if (e.target === document.getElementById('settingsOverlay')) {
      document.getElementById('settingsOverlay').classList.remove('open');
    }
  }
  function saveSettings() {
    const name = document.getElementById('nameInput').value.trim();
    localStorage.setItem('lifetracker_v1_settings', JSON.stringify({ name }));
    document.getElementById('settingsOverlay').classList.remove('open');
    initGreeting();
  }

  initGreeting();
  initToday();
  initStats();
</script>
</body>
</html>
