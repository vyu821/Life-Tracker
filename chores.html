<!--
  LifeTracker — Chores Tracker (chores.html)
  localStorage keys:
    lifetracker_v1_chores  → { habits: [...], completions: { "YYYY-MM-DD": [id, ...] } }
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chores — LifeTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: #F9F7F4;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #888880;
    --accent: #C4714A;
    --accent-light: #F5E8E0;
    --border: #EDEBE7;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 16px;
    --font-head: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 430px; margin: 0 auto; padding: 0 20px 100px; }

  /* Nav */
  .nav { display: flex; align-items: center; justify-content: space-between; padding-top: 52px; padding-bottom: 24px; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.15s; }
  .back-btn:active { color: var(--accent); }
  .page-title { font-family: var(--font-head); font-size: 24px; }
  .nav-right { display: flex; gap: 8px; }
  .icon-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: background 0.15s, transform 0.15s; }
  .icon-btn:active { background: var(--accent-light); transform: scale(0.93); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--card); border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
  .tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 500; border-radius: 9px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; user-select: none; }
  .tab.active { background: var(--accent); color: #fff; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .stat-card { flex: 1; background: var(--card); border-radius: var(--radius); padding: 14px 12px; border: 1px solid var(--border); text-align: center; }
  .stat-val { font-family: var(--font-head); font-size: 22px; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

  /* Section label */
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

  /* Today habits */
  .habit-item {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    user-select: none;
  }
  .habit-item:active { transform: scale(0.97); }
  .habit-item.done { border-color: var(--accent); background: var(--accent-light); }
  .habit-check {
    width: 28px; height: 28px; border-radius: 8px; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .habit-item.done .habit-check { background: var(--accent); border-color: var(--accent); }
  .habit-icon { font-size: 24px; flex-shrink: 0; }
  .habit-info { flex: 1; }
  .habit-name { font-weight: 500; font-size: 16px; }
  .habit-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .habit-streak { font-size: 13px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
  .habit-item.done .habit-meta { color: var(--accent); opacity: 0.7; }

  /* Weekly grid */
  .week-grid { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
  .week-header { display: grid; grid-template-columns: 1fr repeat(7, 32px); gap: 0; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .week-header-cell { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .week-row { display: grid; grid-template-columns: 1fr repeat(7, 32px); gap: 0; padding: 8px 12px; border-bottom: 1px solid var(--border); align-items: center; }
  .week-row:last-child { border-bottom: none; }
  .week-habit-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; display: flex; align-items: center; gap: 5px; }
  .week-cell { width: 24px; height: 24px; border-radius: 6px; background: var(--border); margin: 0 auto; }
  .week-cell.done { background: var(--accent); }
  .week-cell.today-col { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* Manage habits */
  .manage-habit-item {
    background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
    padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .manage-habit-icon { font-size: 22px; }
  .manage-habit-info { flex: 1; }
  .manage-habit-name { font-weight: 500; font-size: 15px; }
  .manage-habit-freq { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .manage-btns { display: flex; gap: 6px; }
  .small-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .small-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .small-btn.danger:hover { background: #FDECEA; color: #C0392B; border-color: #C0392B; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; line-height: 1.5; }

  /* FAB */
  .fab {
    position: fixed; bottom: 28px; right: 50%;
    transform: translateX(calc(50% + 175px));
    width: 56px; height: 56px; border-radius: 18px;
    background: var(--accent); color: #fff;
    border: none; font-size: 26px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(196,113,74,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 10;
  }
  .fab:active { transform: translateX(calc(50% + 175px)) scale(0.93); }
  @media (max-width: 430px) {
    .fab { right: 20px; transform: none; }
    .fab:active { transform: scale(0.93); }
  }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; backdrop-filter: blur(2px); align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--card); width: 100%; max-width: 430px; border-radius: 24px 24px 0 0; padding: 24px 24px 40px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .overlay.open .modal { transform: translateY(0); }
  .panel-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: var(--font-head); font-size: 22px; margin-bottom: 20px; }
  .field-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .field-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 15px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
  .field-input:focus { border-color: var(--accent); }
  .freq-options { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .freq-btn { padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--bg); transition: all 0.15s; }
  .freq-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .day-options { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .day-btn { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer; background: var(--bg); transition: all 0.15s; }
  .day-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px; font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:active { opacity: 0.85; }

  /* Toast */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a class="back-btn" href="index.html">
      <i data-lucide="arrow-left" width="18" height="18"></i> Back
    </a>
    <div class="page-title">Chores</div>
    <div class="nav-right">
      <button class="icon-btn" onclick="setTab('manage')" title="Manage habits"><i data-lucide="settings-2" width="16" height="16"></i></button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="statBestStreak">0</div><div class="stat-lbl">Best streak</div></div>
    <div class="stat-card"><div class="stat-val" id="statMonthTotal">0</div><div class="stat-lbl">This month</div></div>
    <div class="stat-card"><div class="stat-val" id="statWeekRate">0%</div><div class="stat-lbl">Week rate</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="setTab('today')" id="tabToday">Today</div>
    <div class="tab" onclick="setTab('week')" id="tabWeek">This week</div>
    <div class="tab" onclick="setTab('manage')" id="tabManage">Manage</div>
  </div>

  <div id="viewToday"></div>
  <div id="viewWeek" style="display:none"></div>
  <div id="viewManage" style="display:none"></div>
</div>

<button class="fab" onclick="openAddModal()" id="fabBtn" title="Add habit">+</button>

<!-- Add/Edit modal -->
<div class="overlay" id="habitOverlay" onclick="closeOverlayIfOutside(event, 'habitOverlay')">
  <div class="modal">
    <div class="panel-handle"></div>
    <div class="modal-title" id="modalTitle">New Chore</div>
    <input type="hidden" id="editId">
    <label class="field-label">Chore name</label>
    <input class="field-input" id="habitName" type="text" placeholder="e.g. Morning run" maxlength="50">
    <label class="field-label">Icon (emoji)</label>
    <input class="field-input" id="habitEmoji" type="text" placeholder="🏃" maxlength="4">
    <label class="field-label">Frequency</label>
    <div class="freq-options">
      <div class="freq-btn active" data-freq="daily" onclick="setFreq('daily')">Daily</div>
      <div class="freq-btn" data-freq="weekly" onclick="setFreq('weekly')">Specific days</div>
    </div>
    <div id="dayPicker" style="display:none">
      <label class="field-label">Days</label>
      <div class="day-options">
        <div class="day-btn" data-day="mon" onclick="toggleDay('mon')">Mon</div>
        <div class="day-btn" data-day="tue" onclick="toggleDay('tue')">Tue</div>
        <div class="day-btn" data-day="wed" onclick="toggleDay('wed')">Wed</div>
        <div class="day-btn" data-day="thu" onclick="toggleDay('thu')">Thu</div>
        <div class="day-btn" data-day="fri" onclick="toggleDay('fri')">Fri</div>
        <div class="day-btn" data-day="sat" onclick="toggleDay('sat')">Sat</div>
        <div class="day-btn" data-day="sun" onclick="toggleDay('sun')">Sun</div>
      </div>
    </div>
    <button class="btn-primary" onclick="saveHabit()">Save Habit</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  if(window.lucide) lucide.createIcons();

  let currentFreq = 'daily';
  let selectedDays = [];
  let currentTab = 'today';

  function getData() {
    try {
      return JSON.parse(localStorage.getItem('lifetracker_v1_chores') || '{"chores":[],"completions":{}}');
    } catch(e) { return { habits: [], completions: {} }; }
  }
  function saveData(data) {
    try {
      localStorage.setItem('lifetracker_v1_chores', JSON.stringify(data));
    } catch(e) { showToast('Storage full!'); }
  }

  function todayKey() { return new Date().toISOString().slice(0, 10); }
  function dateKey(d) { return d.toISOString().slice(0, 10); }

  function isScheduledToday(h, d) {
    if (h.frequency === 'daily') return true;
    const day = d.toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase().slice(0,3);
    return (h.days || []).includes(day);
  }

  function calcStreak(h, completions) {
    let streak = 0;
    let d = new Date();
    for (let i = 0; i < 365; i++) {
      if (!isScheduledToday(h, d)) { d.setDate(d.getDate() - 1); continue; }
      const key = dateKey(d);
      if ((completions[key] || []).includes(h.id)) streak++;
      else break;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  function calcBestStreak(h, completions) {
    let best = 0, cur = 0;
    let d = new Date();
    for (let i = 0; i < 365; i++) {
      if (!isScheduledToday(h, d)) { d.setDate(d.getDate() - 1); continue; }
      const key = dateKey(d);
      if ((completions[key] || []).includes(h.id)) { cur++; best = Math.max(best, cur); }
      else cur = 0;
      d.setDate(d.getDate() - 1);
    }
    return best;
  }

  function setTab(tab) {
    currentTab = tab;
    ['today','week','manage'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
      document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? '' : 'none';
    });
    document.getElementById('fabBtn').style.display = tab === 'manage' ? 'flex' : 'none';
    if (tab === 'today') renderToday();
    else if (tab === 'week') renderWeek();
    else renderManage();
  }

  function renderToday() {
    const data = getData();
    const today = new Date();
    const key = todayKey();
    const completed = data.completions[key] || [];
    const scheduled = data.habits.filter(h => isScheduledToday(h, today));
    const el = document.getElementById('viewToday');

    if (scheduled.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-text">No habits for today.<br>Add some in the Manage tab.</div></div>`;
      return;
    }

    el.innerHTML = scheduled.map(h => {
      const done = completed.includes(h.id);
      const streak = calcStreak(h, data.completions);
      return `<div class="habit-item${done ? ' done' : ''}" onclick="toggleHabit('${h.id}')">
        <div class="habit-check">${done ? '<i data-lucide="check" width="14" height="14" style="color:#fff"></i>' : ''}</div>
        <div class="habit-icon">${h.emoji || '✨'}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-meta">${done ? 'Done!' : 'Tap to complete'}</div>
        </div>
        <div class="habit-streak">${streak > 0 ? '🔥' + streak : ''}</div>
      </div>`;
    }).join('');
    if(window.lucide) lucide.createIcons();
  }

  function renderWeek() {
    const data = getData();
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      days.push(d);
    }
    const el = document.getElementById('viewWeek');
    if (data.habits.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No chores yet. Add some first!</div></div>`;
      return;
    }

    const todayStr = todayKey();
    const dayNames = days.map(d => d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0,1));

    let html = `<div class="section-label">Last 7 days</div><div class="week-grid">
      <div class="week-header">
        <div></div>
        ${dayNames.map((d,i) => `<div class="week-header-cell">${d}</div>`).join('')}
      </div>`;

    for (const h of data.habits) {
      html += `<div class="week-row">
        <div class="week-habit-name"><span>${h.emoji || '✨'}</span>${h.name}</div>
        ${days.map(d => {
          const key = dateKey(d);
          const done = (data.completions[key] || []).includes(h.id);
          const isToday = key === todayStr;
          const scheduled = isScheduledToday(h, d);
          return `<div class="week-cell${done ? ' done' : ''}${isToday ? ' today-col' : ''}${!scheduled ? ' unscheduled' : ''}"></div>`;
        }).join('')}
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  }

  function renderManage() {
    const data = getData();
    const el = document.getElementById('viewManage');
    if (data.habits.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No chores yet.<br>Tap + to add your first habit.</div></div>`;
      return;
    }
    el.innerHTML = data.habits.map(h => `
      <div class="manage-habit-item">
        <div class="manage-habit-icon">${h.emoji || '✨'}</div>
        <div class="manage-habit-info">
          <div class="manage-habit-name">${h.name}</div>
          <div class="manage-habit-freq">${h.frequency === 'daily' ? 'Every day' : (h.days || []).join(', ')}</div>
        </div>
        <div class="manage-btns">
          <button class="small-btn" onclick="editHabit('${h.id}')">Edit</button>
          <button class="small-btn danger" onclick="deleteHabit('${h.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    const data = getData();
    // Best streak
    let best = 0;
    for (const h of data.habits) { const s = calcBestStreak(h, data.completions); if (s > best) best = s; }
    document.getElementById('statBestStreak').textContent = best + 'd';

    // This month completions
    const now = new Date();
    const monthPrefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    let monthTotal = 0;
    for (const [key, ids] of Object.entries(data.completions)) {
      if (key.startsWith(monthPrefix)) monthTotal += ids.length;
    }
    document.getElementById('statMonthTotal').textContent = monthTotal;

    // Week rate
    let scheduled = 0, done = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = dateKey(d);
      const comp = data.completions[key] || [];
      for (const h of data.habits) {
        if (isScheduledToday(h, d)) { scheduled++; if (comp.includes(h.id)) done++; }
      }
    }
    document.getElementById('statWeekRate').textContent = scheduled ? Math.round(done/scheduled*100) + '%' : '0%';
  }

  function toggleHabit(id) {
    const data = getData();
    const key = todayKey();
    if (!data.completions[key]) data.completions[key] = [];
    const idx = data.completions[key].indexOf(id);
    if (idx >= 0) data.completions[key].splice(idx, 1);
    else data.completions[key].push(id);
    saveData(data);
    renderToday();
    updateStats();
    showToast(idx >= 0 ? 'Unmarked' : 'Habit completed! ✓');
  }

  function openAddModal() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'New Chore';
    document.getElementById('habitName').value = '';
    document.getElementById('habitEmoji').value = '';
    setFreq('daily');
    selectedDays = [];
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('habitOverlay').classList.add('open');
  }

  function editHabit(id) {
    const data = getData();
    const h = data.habits.find(x => x.id === id);
    if (!h) return;
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = 'Edit Chore';
    document.getElementById('habitName').value = h.name;
    document.getElementById('habitEmoji').value = h.emoji || '';
    setFreq(h.frequency || 'daily');
    selectedDays = h.days || [];
    document.querySelectorAll('.day-btn').forEach(b => {
      b.classList.toggle('active', selectedDays.includes(b.dataset.day));
    });
    document.getElementById('habitOverlay').classList.add('open');
    setTab('manage');
  }

  function deleteHabit(id) {
    if (!confirm('Delete this chore? All history will be lost.')) return;
    const data = getData();
    data.habits = data.habits.filter(h => h.id !== id);
    saveData(data);
    renderManage();
    updateStats();
    showToast('Chore deleted');
  }

  function saveHabit() {
    const name = document.getElementById('habitName').value.trim();
    if (!name) { showToast('Please enter a name'); return; }
    const data = getData();
    const editId = document.getElementById('editId').value;
    const id = editId || Date.now().toString(36);
    const habit = {
      id,
      name,
      emoji: document.getElementById('habitEmoji').value.trim() || '✨',
      frequency: currentFreq,
      days: currentFreq === 'weekly' ? selectedDays : []
    };

    if (!editId && data.habits.length >= 10) { showToast('Max 10 habits'); return; }

    if (editId) {
      const idx = data.habits.findIndex(h => h.id === editId);
      if (idx >= 0) data.habits[idx] = habit;
    } else {
      data.habits.push(habit);
    }
    saveData(data);
    document.getElementById('habitOverlay').classList.remove('open');
    showToast(editId ? 'Chore updated' : 'Chore added!');
    setTab('today');
    updateStats();
  }

  function setFreq(f) {
    currentFreq = f;
    document.querySelectorAll('.freq-btn').forEach(b => b.classList.toggle('active', b.dataset.freq === f));
    document.getElementById('dayPicker').style.display = f === 'weekly' ? '' : 'none';
  }

  function toggleDay(d) {
    const idx = selectedDays.indexOf(d);
    if (idx >= 0) selectedDays.splice(idx, 1);
    else selectedDays.push(d);
    document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', selectedDays.includes(b.dataset.day)));
  }

  function closeOverlayIfOutside(e, id) {
    if (e.target === document.getElementById(id)) document.getElementById(id).classList.remove('open');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Init
  document.getElementById('fabBtn').style.display = 'none';
  updateStats();
  setTab('today');
</script>
</body>
</html>
